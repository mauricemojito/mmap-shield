services:
  nfs-server:
    image: erichough/nfs-server:latest
    container_name: mmap-shield-nfs
    privileged: true
    environment:
      NFS_EXPORT_0: '/export *(rw,sync,no_subtree_check,no_root_squash,insecure,fsid=0)'
    volumes:
      - nfs-data:/export
    ports:
      - "111:111/tcp"
      - "111:111/udp"
      - "2049:2049/tcp"
      - "2049:2049/udp"
      - "32765:32765/tcp"
      - "32765:32765/udp"
      - "32767:32767/tcp"
      - "32767:32767/udp"
    cap_add:
      - SYS_ADMIN

volumes:
  nfs-data:
